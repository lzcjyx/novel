# AI Novel Factory — All-in-one Docker Compose
# 唯一依赖: Docker Desktop (https://docker.com)
# 启动: docker compose up -d
# Tauri app 只做监控面板，不再管理进程

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: novel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: novel_factory
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-novel123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel -d novel_factory"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    user: root
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file: .env
    environment:
      - TZ=Asia/Shanghai
      - N8N_BLOCK_FS_WRITE_ACCESS=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODES_EXCLUDE=[]
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_UNVERIFIED_PACKAGES_ENABLED=true
      - WRITER_SERVICE_URL=http://writer:8787
      - WRITER_SERVICE_TOKEN=${WRITER_SERVICE_TOKEN}
      - DEEPSEEK_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - n8n_data:/root/.n8n
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy

  writer:
    build:
      context: .
      dockerfile: writer-service/Dockerfile
    container_name: writer-service
    restart: unless-stopped
    env_file: .env
    environment:
      - WRITER_SERVICE_PROMPTS_DIR=/app/prompts
      - WRITER_SERVICE_PORT=8787
    volumes:
      - ./prompts:/app/prompts:ro
      - ./data:/data
    depends_on:
      - n8n

  orch:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: orchestrator
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - N8N_API_URL=http://n8n:5678/api/v1
      - PAPER_DIR=/data/paper
    volumes:
      - ./data:/data
    depends_on:
      - n8n

volumes:
  n8n_data:
  pgdata:
