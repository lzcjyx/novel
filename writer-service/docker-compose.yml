# ===================================================================
# docker-compose.yml — writer-service only
#
# 注意：
#   - 此文件不包含 PostgreSQL service。数据库使用 Neon 托管。
#   - Claude Code CLI 需要能访问文件系统（prompt 临时文件）。
#   - 确保 ANTHROPIC_API_KEY 已设置。
# ===================================================================

version: "3.8"

services:
  writer-service:
    build:
      context: .
      dockerfile: writer-service/Dockerfile
    container_name: novel-writer-service
    ports:
      - "8787:8787"
    environment:
      - WRITER_SERVICE_PORT=8787
      - WRITER_SERVICE_TOKEN=${WRITER_SERVICE_TOKEN:-change_me}
      - WRITER_SERVICE_MAX_BODY=2mb
      - WRITER_SERVICE_MAX_CONCURRENT=2
      - WRITER_SERVICE_TEMP_DIR=/tmp/n8n-prompts
      - WRITER_SERVICE_PROMPTS_DIR=/app/prompts
      - CLAUDE_CODE_COMMAND=claude
      - CLAUDE_CODE_MAX_TURNS=${CLAUDE_CODE_MAX_TURNS:-3}
      - CLAUDE_CODE_TIMEOUT_MS=${CLAUDE_CODE_TIMEOUT_MS:-600000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8787/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3

